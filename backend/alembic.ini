# Alembic configuration file

[alembic]

# path to migration scripts
script_location = alembic

# database URL
# This will be overridden by env.py using your app config
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/renkei

# file template
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# timezone
timezone = UTC

# truncate slug length
truncate_slug_length = 40

# revision environment
revision_environment = false

# allow .pyc files
sourceless = false

# version locations
version_locations = alembic/versions

# version path separator
version_path_separator = os

# recursive version locations
recursive_version_locations = false

# output encoding
output_encoding = utf-8


# =========================
# LOGGING CONFIGURATION
# =========================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


[logger_root]
level = WARN
handlers = console


[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S